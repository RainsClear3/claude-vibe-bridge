<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b81"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Bridge arc -->
  <path d="M80 320 Q256 160 432 320" stroke="url(#glow)" stroke-width="24" fill="none" stroke-linecap="round"/>
  <!-- Bridge pylons -->
  <rect x="120" y="280" width="16" height="120" rx="4" fill="url(#glow)" opacity="0.8"/>
  <rect x="376" y="280" width="16" height="120" rx="4" fill="url(#glow)" opacity="0.8"/>
  <!-- Connection nodes -->
  <circle cx="256" cy="192" r="32" fill="url(#glow)"/>
  <circle cx="256" cy="192" r="16" fill="#1a1a2e"/>
  <circle cx="148" cy="280" r="16" fill="url(#glow)" opacity="0.6"/>
  <circle cx="364" cy="280" r="16" fill="url(#glow)" opacity="0.6"/>
  <!-- Signal waves -->
  <path d="M220 148 Q256 120 292 148" stroke="url(#glow)" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M200 128 Q256 92 312 128" stroke="url(#glow)" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.3"/>
</svg>
