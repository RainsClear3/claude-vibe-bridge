<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="/manifest.json">
  <title>Claude Vibe Bridge</title>
  <link rel="icon" type="image/svg+xml" href="/logo.svg">
  <link rel="stylesheet" href="/src/styles/variables.css">
  <link rel="stylesheet" href="/src/styles/themes.css">
  <link rel="stylesheet" href="/src/styles/app.css">
</head>
<body>
  <!-- Server Configuration Screen (shown on first start) -->
  <div id="config-screen" class="config-screen hidden">
    <div class="config-container">
      <h1>🔗 服务器配置</h1>
      <p class="config-desc">请输入你的 Claude Vibe Bridge 服务器地址</p>
      <div class="config-input-group">
        <label for="server-url">服务器地址</label>
        <input 
          type="url" 
          id="server-url" 
          placeholder="https://your-domain.ngrok-free.dev"
          required
        >
      </div>
      <p class="config-hint">
        例如：<code>https://xxx.ngrok-free.dev</code><br>
        或者：<code>http://192.168.1.100:3900</code>
      </p>
      <button id="save-config-btn" class="config-btn">保存并连接</button>
    </div>
  </div>

  <div id="app">
    <!-- Sidebar: Thread list (hidden by default on mobile) -->
    <div id="sidebar" class="sidebar">
      <div id="sidebar-header">
        <span class="sidebar-title">Claude Vibe Bridge</span>
        <button id="new-session-btn" title="新会话">+</button>
      </div>
      <div id="thread-list"></div>
      <div class="sidebar-footer">
        <button id="settings-btn" class="sidebar-footer-btn">⚙️ 设置</button>
      </div>
    </div>

    <!-- Main area -->
    <div id="main-area">
      <div id="status-bar">
        <button id="sidebar-toggle" title="会话列表">☰</button>
        <button id="quick-settings-btn" title="服务器设置" class="quick-settings-btn">⚙️</button>
      </div>
      <div id="chat-container">
        <div id="messages"></div>
      </div>
      <div id="input-bar"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
