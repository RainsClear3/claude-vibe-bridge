
# frp 服务端配置 - 部署在公网云服务器上
# 下载地址: https://github.com/fatedier/frp/releases

[common]
# frp 服务端监听端口，frpc 连接用
bindPort = 7000

# Web 管理面板（可选，方便查看状态）
webServer.addr = "0.0.0.0"
webServer.port = 7500
webServer.user = "admin"
webServer.password = "your_secure_password_here"  # 请修改密码！

# 认证（可选，提升安全性）
auth.token = "your_auth_token_here"  # frpc 需要使用相同的 token

# 日志配置
log.to = "./frps.log"
log.level = "info"
log.maxDays = 3

